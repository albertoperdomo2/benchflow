apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: cleanup-llm-d-deployment
  labels:
    app.kubernetes.io/version: "0.4"
  annotations:
    tekton.dev/displayName: "Cleanup llm-d Deployment"
spec:
  description: >-
    Delete an llm-d deployment by removing the Helm releases and HTTPRoute
    described by the run plan while preserving the model PVC contents.
  params:
    - name: IMAGE
      type: string
      default: ghcr.io/albertoperdomo2/benchflow/benchflow:latest
    - name: RUN_PLAN
      type: string
  steps:
    - name: cleanup-releases
      image: $(params.IMAGE)
      command:
        - bflow
      args:
        - undeploy
        - llm-d
        - --run-plan-json
        - $(params.RUN_PLAN)
