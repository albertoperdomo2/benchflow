apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: publish-matrix-result
  labels:
    app.kubernetes.io/version: "0.1"
  annotations:
    tekton.dev/displayName: "Publish Matrix Result"
spec:
  description: >-
    Publish a single child PipelineRun MLflow result into the parent matrix
    results ConfigMap.
  params:
    - name: IMAGE
      type: string
      default: ghcr.io/albertoperdomo2/benchflow:latest
    - name: RUN_PLAN
      type: string
    - name: MATRIX_RESULTS_CONFIGMAP
      type: string
    - name: CHILD_EXECUTION_NAME
      type: string
    - name: MLFLOW_RUN_ID
      type: string
    - name: BENCHMARK_START_TIME
      type: string
      default: ""
    - name: BENCHMARK_END_TIME
      type: string
      default: ""
  steps:
    - name: publish
      image: $(params.IMAGE)
      imagePullPolicy: Always
      env:
        - name: MLFLOW_TRACKING_URI
          valueFrom:
            secretKeyRef:
              name: mlflow-ui-auth
              key: tracking-uri
              optional: true
        - name: MLFLOW_TRACKING_USERNAME
          valueFrom:
            secretKeyRef:
              name: mlflow-ui-auth
              key: username
              optional: true
        - name: MLFLOW_TRACKING_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mlflow-ui-auth
              key: password
              optional: true
        - name: MLFLOW_WORKSPACE
          valueFrom:
            secretKeyRef:
              name: mlflow-ui-auth
              key: workspace
              optional: true
        - name: MLFLOW_TRACKING_INSECURE_TLS
          value: "true"
      command:
        - bflow
      args:
        - task
        - publish-matrix-result
        - --run-plan-json
        - $(params.RUN_PLAN)
        - --configmap-name
        - $(params.MATRIX_RESULTS_CONFIGMAP)
        - --child-execution-name
        - $(params.CHILD_EXECUTION_NAME)
        - --mlflow-run-id
        - $(params.MLFLOW_RUN_ID)
        - --benchmark-start-time
        - $(params.BENCHMARK_START_TIME)
        - --benchmark-end-time
        - $(params.BENCHMARK_END_TIME)
