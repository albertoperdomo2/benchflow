apiVersion: v1
kind: Secret
metadata:
  name: mlflow-s3-secret
  labels:
    app.kubernetes.io/name: benchflow
type: Opaque
stringData:
  access-key: "your-access-key-id"
  secret-key: "your-secret-access-key"
  bucket-name: "mlflow-artifacts"
  region: "us-east-1"
---
# MLflow S3 Credentials Secret
#
# This secret is optional. BenchFlow's normal MLflow path uploads artifacts
# through the MLflow server and does not require direct S3 credentials.
#
# Keep this secret only for legacy or advanced paths that still need direct
# client-side S3 access.
#
# To create this secret:
#   1. Replace the placeholder values above with actual S3 credentials
#   2. Create the secret:
#      oc create -f config/secrets/mlflow-s3-creds.yaml
#
# Or create directly from command line:
#   oc create secret generic mlflow-s3-secret \
#     --from-literal=access-key=your-access-key-id \
#     --from-literal=secret-key=your-secret-access-key \
#     --from-literal=bucket-name=mlflow-artifacts \
#     --from-literal=region=us-east-1
#
# IMPORTANT: Never commit actual credentials to version control!
