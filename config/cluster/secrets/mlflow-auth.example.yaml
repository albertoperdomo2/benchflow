apiVersion: v1
kind: Secret
metadata:
  name: mlflow-ui-auth
  labels:
    app.kubernetes.io/name: benchflow
type: Opaque
stringData:
  username: "admin"
  password: "changeme"
  tracking-uri: "https://mlflow-server.example.com"
---
# MLflow Authentication Secret
#
# This secret is required when MLflow tracking is enabled and the MLflow server
# requires authentication.
#
# Fields:
#   - username: MLflow server username
#   - password: MLflow server password
#   - tracking-uri: MLflow tracking server URL (e.g., https://mlflow.example.com)
#
# To create this secret:
#   1. Replace the placeholder values above with actual credentials and URL
#   2. Create the secret:
#      oc create -f config/secrets/mlflow-auth.yaml
#
# Or create directly from command line:
#   oc create secret generic mlflow-ui-auth \
#     --from-literal=username=admin \
#     --from-literal=password=your-secure-password \
#     --from-literal=tracking-uri=https://mlflow-server.example.com
#
# IMPORTANT: Use strong passwords and never commit actual credentials to version control!
