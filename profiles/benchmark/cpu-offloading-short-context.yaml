apiVersion: benchflow.io/v1alpha1
kind: BenchmarkProfile
metadata:
  name: cpu-offloading-short-context
spec:
  guidellm:
    backend:
      kind: openai_http
    profile:
      kind: concurrent
    override:
      profile.streams: [1, 50, 100, 150, 300, 400, 500, 650]
    data:
      kind: synthetic_text
      prompt_tokens: 512
      output_tokens: 128
      turns: 5
      prefix_buckets:
        - bucket_weight: 100
          prefix_tokens: 10000
          prefix_count: 2*concurrency
    constraint:
      - kind: max_duration
        seconds: 240
  requirements:
    min_max_model_len: 40960
  env:
    GUIDELLM__LOGGING__CONSOLE_LOG_LEVEL: "INFO"
