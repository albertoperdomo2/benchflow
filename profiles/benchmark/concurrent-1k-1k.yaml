apiVersion: benchflow.io/v1alpha1
kind: BenchmarkProfile
metadata:
  name: guidellm-concurrent-1k-1k
spec:
  backend_type: openai_http
  rate_type: concurrent
  rates: [300, 200, 100, 50, 1]
  data: prompt_tokens=1000,output_tokens=1000
  max_seconds: 600
  env:
    GUIDELLM__LOGGING__CONSOLE_LOG_LEVEL: "DEBUG"
