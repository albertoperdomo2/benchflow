apiVersion: benchflow.io/v1alpha1
kind: BenchmarkProfile
metadata:
  name: guidellm-multi-turn
spec:
  guidellm:
    backend:
      kind: openai_http
    profile:
      kind: concurrent
    override:
      profile.streams: [32, 64, 128, 256, 512]
    data:
      kind: synthetic_text
      prompt_tokens: 128
      output_tokens: 128
      turns: 5
      prefix_buckets:
        - bucket_weight: 100
          prefix_tokens: 10000
          prefix_count: 2*concurrency
    constraint:
      - kind: max_requests
        count: 10*concurrency
  requirements:
    min_max_model_len: 40960
  env:
    GUIDELLM__LOGGING__CONSOLE_LOG_LEVEL: "DEBUG"
