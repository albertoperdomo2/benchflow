apiVersion: benchflow.io/v1alpha1
kind: BenchmarkProfile
metadata:
  name: guidellm-concurrent-8k-1k
spec:
  guidellm:
    backend:
      kind: openai_http
    profile:
      kind: concurrent
    override:
      profile.streams: [64, 32, 16, 8, 4, 2, 1]
    data:
      kind: synthetic_text
      prompt_tokens: 8000
      output_tokens: 1000
    constraint:
      - kind: max_duration
        seconds: 600
  env:
    GUIDELLM__LOGGING__CONSOLE_LOG_LEVEL: "DEBUG"
