apiVersion: benchflow.io/v1alpha1
kind: BenchmarkProfile
metadata:
  name: guidellm-concurrent-heavy-heterogeneous
spec:
  guidellm:
    backend:
      kind: openai_http
    profile:
      kind: concurrent
    override:
      profile.streams: [300, 200, 100, 50, 1]
    data:
      kind: synthetic_text
      prompt_tokens: 8000
      prompt_tokens_stdev: 8500
      prompt_tokens_min: 50
      prompt_tokens_max: 30000
      output_tokens: 800
      output_tokens_stdev: 1500
      output_tokens_min: 20
      output_tokens_max: 8000
    constraint:
      - kind: max_duration
        seconds: 600
    # pre_warmup:
      # rate: 25
      # constraint:
      #   - kind: max_duration
      #     seconds: 60
  requirements:
    min_max_model_len: 40960
  env:
    GUIDELLM__LOGGING__CONSOLE_LOG_LEVEL: "INFO"
