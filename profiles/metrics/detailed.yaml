apiVersion: benchflow.io/v1alpha1
kind: MetricsProfile
metadata:
  name: detailed
spec:
  prometheus_url: https://thanos-querier.openshift-monitoring.svc:9091
  query_step: 15s
  query_timeout: 30s
  verify_tls: false
  queries:
    active_pods: count(kube_pod_info{namespace="$namespace", pod=~".*$release.*"})
    avg_gpu_utilization: avg(DCGM_FI_DEV_GPU_UTIL{exported_namespace="$namespace", exported_pod=~".*$release.*"})
    avg_cpu_usage_percent: avg(rate(container_cpu_usage_seconds_total{namespace="$namespace", pod=~".*$release.*"}[5m])) * 100
    avg_memory_working_set_bytes: avg(container_memory_working_set_bytes{namespace="$namespace", pod=~".*$release.*"})
    prompt_tokens_total: '{__name__=~"(vllm|kserve_vllm):prompt_tokens_total", namespace="$namespace", pod=~"$modelserver_pod_regex"}'
    generation_tokens_total: '{__name__=~"(vllm|kserve_vllm):generation_tokens_total", namespace="$namespace", pod=~"$modelserver_pod_regex"}'
    prompt_token_rate_per_second: rate({__name__=~"(vllm|kserve_vllm):prompt_tokens_total", namespace="$namespace", pod=~"$modelserver_pod_regex"}[5m])
    prompt_tokens_rate_by_source: sum by (pod, source) (rate({__name__=~"(vllm|kserve_vllm):prompt_tokens_by_source_total", namespace="$namespace", pod=~"$modelserver_pod_regex", source=~"local_compute|local_cache_hit|external_kv_transfer"}[5m]))
    generation_token_rate_per_second: rate({__name__=~"(vllm|kserve_vllm):generation_tokens_total", namespace="$namespace", pod=~"$modelserver_pod_regex"}[5m])
    generation_token_rate_sum_per_second: sum(rate({__name__=~"(vllm|kserve_vllm):generation_tokens_total", namespace="$namespace", pod=~"$modelserver_pod_regex"}[5m]))
    request_success_rate_by_pod: sum by (pod) (rate({__name__=~"(vllm|kserve_vllm):request_success_total", namespace="$namespace", pod=~"$modelserver_pod_regex"}[5m]))
    num_requests_running: '{__name__=~"(vllm|kserve_vllm):num_requests_running", namespace="$namespace", pod=~"$modelserver_pod_regex"}'
    num_requests_waiting: '{__name__=~"(vllm|kserve_vllm):num_requests_waiting", namespace="$namespace", pod=~"$modelserver_pod_regex"}'
    requests_running_waiting: label_replace({__name__=~"(vllm|kserve_vllm):num_requests_running", namespace="$namespace", pod=~"$modelserver_pod_regex"}, "state", "running", "__name__", ".*") or label_replace({__name__=~"(vllm|kserve_vllm):num_requests_waiting", namespace="$namespace", pod=~"$modelserver_pod_regex"}, "state", "waiting", "__name__", ".*")
    requests_waiting_by_reason: '{__name__=~"(vllm|kserve_vllm):num_requests_waiting_by_reason", namespace="$namespace", pod=~"$modelserver_pod_regex"}'
    e2e_request_latency_p50_seconds: histogram_quantile(0.5, sum(rate({__name__=~"(vllm|kserve_vllm):e2e_request_latency_seconds_bucket", namespace="$namespace", pod=~"$modelserver_pod_regex"}[5m])) by (le))
    e2e_request_latency_p90_seconds: histogram_quantile(0.9, sum(rate({__name__=~"(vllm|kserve_vllm):e2e_request_latency_seconds_bucket", namespace="$namespace", pod=~"$modelserver_pod_regex"}[5m])) by (le))
    e2e_request_latency_p99_seconds: histogram_quantile(0.99, sum(rate({__name__=~"(vllm|kserve_vllm):e2e_request_latency_seconds_bucket", namespace="$namespace", pod=~"$modelserver_pod_regex"}[5m])) by (le))
    ttft_p50_seconds: histogram_quantile(0.5, sum(rate({__name__=~"(vllm|kserve_vllm):time_to_first_token_seconds_bucket", namespace="$namespace", pod=~"$modelserver_pod_regex"}[5m])) by (le))
    ttft_p90_seconds: histogram_quantile(0.9, sum(rate({__name__=~"(vllm|kserve_vllm):time_to_first_token_seconds_bucket", namespace="$namespace", pod=~"$modelserver_pod_regex"}[5m])) by (le))
    ttft_p99_seconds: histogram_quantile(0.99, sum(rate({__name__=~"(vllm|kserve_vllm):time_to_first_token_seconds_bucket", namespace="$namespace", pod=~"$modelserver_pod_regex"}[5m])) by (le))
    tpot_p50_seconds: histogram_quantile(0.5, sum(rate({__name__=~"(vllm|kserve_vllm):request_time_per_output_token_seconds_bucket", namespace="$namespace", pod=~"$modelserver_pod_regex"}[5m])) by (le))
    tpot_p90_seconds: histogram_quantile(0.9, sum(rate({__name__=~"(vllm|kserve_vllm):request_time_per_output_token_seconds_bucket", namespace="$namespace", pod=~"$modelserver_pod_regex"}[5m])) by (le))
    tpot_p99_seconds: histogram_quantile(0.99, sum(rate({__name__=~"(vllm|kserve_vllm):request_time_per_output_token_seconds_bucket", namespace="$namespace", pod=~"$modelserver_pod_regex"}[5m])) by (le))
    prefill_time_p50_seconds: histogram_quantile(0.5, sum(rate({__name__=~"(vllm|kserve_vllm):request_prefill_time_seconds_bucket", namespace="$namespace", pod=~"$modelserver_pod_regex"}[5m])) by (le))
    prefill_time_p90_seconds: histogram_quantile(0.9, sum(rate({__name__=~"(vllm|kserve_vllm):request_prefill_time_seconds_bucket", namespace="$namespace", pod=~"$modelserver_pod_regex"}[5m])) by (le))
    prefill_time_p99_seconds: histogram_quantile(0.99, sum(rate({__name__=~"(vllm|kserve_vllm):request_prefill_time_seconds_bucket", namespace="$namespace", pod=~"$modelserver_pod_regex"}[5m])) by (le))
    decode_time_p50_seconds: histogram_quantile(0.5, sum(rate({__name__=~"(vllm|kserve_vllm):request_decode_time_seconds_bucket", namespace="$namespace", pod=~"$modelserver_pod_regex"}[5m])) by (le))
    decode_time_p90_seconds: histogram_quantile(0.9, sum(rate({__name__=~"(vllm|kserve_vllm):request_decode_time_seconds_bucket", namespace="$namespace", pod=~"$modelserver_pod_regex"}[5m])) by (le))
    decode_time_p99_seconds: histogram_quantile(0.99, sum(rate({__name__=~"(vllm|kserve_vllm):request_decode_time_seconds_bucket", namespace="$namespace", pod=~"$modelserver_pod_regex"}[5m])) by (le))
    queue_time_p50_seconds: histogram_quantile(0.5, sum(rate({__name__=~"(vllm|kserve_vllm):request_queue_time_seconds_bucket", namespace="$namespace", pod=~"$modelserver_pod_regex"}[5m])) by (le))
    queue_time_p90_seconds: histogram_quantile(0.9, sum(rate({__name__=~"(vllm|kserve_vllm):request_queue_time_seconds_bucket", namespace="$namespace", pod=~"$modelserver_pod_regex"}[5m])) by (le))
    queue_time_p99_seconds: histogram_quantile(0.99, sum(rate({__name__=~"(vllm|kserve_vllm):request_queue_time_seconds_bucket", namespace="$namespace", pod=~"$modelserver_pod_regex"}[5m])) by (le))
    inference_time_p50_seconds: histogram_quantile(0.5, sum(rate({__name__=~"(vllm|kserve_vllm):request_inference_time_seconds_bucket", namespace="$namespace", pod=~"$modelserver_pod_regex"}[5m])) by (le))
    inference_time_p90_seconds: histogram_quantile(0.9, sum(rate({__name__=~"(vllm|kserve_vllm):request_inference_time_seconds_bucket", namespace="$namespace", pod=~"$modelserver_pod_regex"}[5m])) by (le))
    inference_time_p99_seconds: histogram_quantile(0.99, sum(rate({__name__=~"(vllm|kserve_vllm):request_inference_time_seconds_bucket", namespace="$namespace", pod=~"$modelserver_pod_regex"}[5m])) by (le))
    kv_cache_usage_percent: '{__name__=~"(vllm|kserve_vllm):kv_cache_usage_perc", namespace="$namespace", pod=~"$modelserver_pod_regex"}'
    prefix_cache_hit_rate: sum(rate({__name__=~"(vllm|kserve_vllm):prefix_cache_hits(_total)?", namespace="$namespace", pod=~"$modelserver_pod_regex"}[5m])) / clamp_min(sum(rate({__name__=~"(vllm|kserve_vllm):prefix_cache_queries(_total)?", namespace="$namespace", pod=~"$modelserver_pod_regex"}[5m])), 1)
    kv_offload_bytes_rate_by_pod: sum by (pod, transfer_type) (rate({__name__=~"(vllm|kserve_vllm):kv_offload_total_bytes_total", namespace="$namespace", pod=~"$modelserver_pod_regex"}[5m]))
    kv_offload_time_rate_by_pod: sum by (pod, transfer_type) (rate({__name__=~"(vllm|kserve_vllm):kv_offload_total_time_total", namespace="$namespace", pod=~"$modelserver_pod_regex"}[5m]))
    kv_offload_seconds_per_gib_by_pod: sum by (pod, transfer_type) (rate({__name__=~"(vllm|kserve_vllm):kv_offload_total_time_total", namespace="$namespace", pod=~"$modelserver_pod_regex"}[5m])) / clamp_min(sum by (pod, transfer_type) (rate({__name__=~"(vllm|kserve_vllm):kv_offload_total_bytes_total", namespace="$namespace", pod=~"$modelserver_pod_regex"}[5m])) / 1024 / 1024 / 1024, 0.001)
    kv_offload_transfer_bytes_total_by_direction: label_replace({__name__=~"(vllm|kserve_vllm):kv_offload_store_bytes_total", namespace="$namespace", pod=~"$modelserver_pod_regex"}, "direction", "GPU_to_CPU", "__name__", ".*") or label_replace({__name__=~"(vllm|kserve_vllm):kv_offload_load_bytes_total", namespace="$namespace", pod=~"$modelserver_pod_regex"}, "direction", "CPU_to_GPU", "__name__", ".*")
    kv_offload_transfer_bytes_rate_by_direction: label_replace(rate({__name__=~"(vllm|kserve_vllm):kv_offload_store_bytes_total", namespace="$namespace", pod=~"$modelserver_pod_regex"}[5m]), "direction", "GPU_to_CPU", "__name__", ".*") or label_replace(rate({__name__=~"(vllm|kserve_vllm):kv_offload_load_bytes_total", namespace="$namespace", pod=~"$modelserver_pod_regex"}[5m]), "direction", "CPU_to_GPU", "__name__", ".*")
    kv_offload_transfer_ops_rate_by_direction: label_replace(rate({__name__=~"(vllm|kserve_vllm):kv_offload_store_size_count", namespace="$namespace", pod=~"$modelserver_pod_regex"}[5m]), "direction", "GPU_to_CPU", "__name__", ".*") or label_replace(rate({__name__=~"(vllm|kserve_vllm):kv_offload_load_size_count", namespace="$namespace", pod=~"$modelserver_pod_regex"}[5m]), "direction", "CPU_to_GPU", "__name__", ".*")
    kv_offload_transfer_latency_ms_by_direction: label_replace(rate({__name__=~"(vllm|kserve_vllm):kv_offload_store_time_total", namespace="$namespace", pod=~"$modelserver_pod_regex"}[5m]) / clamp_min(rate({__name__=~"(vllm|kserve_vllm):kv_offload_store_size_count", namespace="$namespace", pod=~"$modelserver_pod_regex"}[5m]), 0.001) * 1000, "direction", "GPU_to_CPU", "__name__", ".*") or label_replace(rate({__name__=~"(vllm|kserve_vllm):kv_offload_load_time_total", namespace="$namespace", pod=~"$modelserver_pod_regex"}[5m]) / clamp_min(rate({__name__=~"(vllm|kserve_vllm):kv_offload_load_size_count", namespace="$namespace", pod=~"$modelserver_pod_regex"}[5m]), 0.001) * 1000, "direction", "CPU_to_GPU", "__name__", ".*")
    kv_offload_effective_bytes_rate_by_direction: label_replace(rate({__name__=~"(vllm|kserve_vllm):kv_offload_store_bytes_total", namespace="$namespace", pod=~"$modelserver_pod_regex"}[5m]) / clamp_min(rate({__name__=~"(vllm|kserve_vllm):kv_offload_store_time_total", namespace="$namespace", pod=~"$modelserver_pod_regex"}[5m]), 0.001), "direction", "GPU_to_CPU", "__name__", ".*") or label_replace(rate({__name__=~"(vllm|kserve_vllm):kv_offload_load_bytes_total", namespace="$namespace", pod=~"$modelserver_pod_regex"}[5m]) / clamp_min(rate({__name__=~"(vllm|kserve_vllm):kv_offload_load_time_total", namespace="$namespace", pod=~"$modelserver_pod_regex"}[5m]), 0.001), "direction", "CPU_to_GPU", "__name__", ".*")
    kv_offload_transfer_size_bytes_by_direction: label_replace(rate({__name__=~"(vllm|kserve_vllm):kv_offload_store_size_sum", namespace="$namespace", pod=~"$modelserver_pod_regex"}[5m]) / clamp_min(rate({__name__=~"(vllm|kserve_vllm):kv_offload_store_size_count", namespace="$namespace", pod=~"$modelserver_pod_regex"}[5m]), 0.001), "direction", "GPU_to_CPU", "__name__", ".*") or label_replace(rate({__name__=~"(vllm|kserve_vllm):kv_offload_load_size_sum", namespace="$namespace", pod=~"$modelserver_pod_regex"}[5m]) / clamp_min(rate({__name__=~"(vllm|kserve_vllm):kv_offload_load_size_count", namespace="$namespace", pod=~"$modelserver_pod_regex"}[5m]), 0.001), "direction", "CPU_to_GPU", "__name__", ".*")
    kv_block_lifetime_p50_seconds_by_pod: histogram_quantile(0.5, sum by (pod, le) (rate({__name__=~"(vllm|kserve_vllm):kv_block_lifetime_seconds_bucket", namespace="$namespace", pod=~"$modelserver_pod_regex"}[5m])))
    kv_block_lifetime_p90_seconds_by_pod: histogram_quantile(0.9, sum by (pod, le) (rate({__name__=~"(vllm|kserve_vllm):kv_block_lifetime_seconds_bucket", namespace="$namespace", pod=~"$modelserver_pod_regex"}[5m])))
    kv_block_lifetime_p99_seconds_by_pod: histogram_quantile(0.99, sum by (pod, le) (rate({__name__=~"(vllm|kserve_vllm):kv_block_lifetime_seconds_bucket", namespace="$namespace", pod=~"$modelserver_pod_regex"}[5m])))
    kv_block_idle_before_evict_p50_seconds_by_pod: histogram_quantile(0.5, sum by (pod, le) (rate({__name__=~"(vllm|kserve_vllm):kv_block_idle_before_evict_seconds_bucket", namespace="$namespace", pod=~"$modelserver_pod_regex"}[5m])))
    kv_block_idle_before_evict_p90_seconds_by_pod: histogram_quantile(0.9, sum by (pod, le) (rate({__name__=~"(vllm|kserve_vllm):kv_block_idle_before_evict_seconds_bucket", namespace="$namespace", pod=~"$modelserver_pod_regex"}[5m])))
    kv_block_idle_before_evict_p99_seconds_by_pod: histogram_quantile(0.99, sum by (pod, le) (rate({__name__=~"(vllm|kserve_vllm):kv_block_idle_before_evict_seconds_bucket", namespace="$namespace", pod=~"$modelserver_pod_regex"}[5m])))
    kv_block_reuse_gap_p50_seconds_by_pod: histogram_quantile(0.5, sum by (pod, le) (rate({__name__=~"(vllm|kserve_vllm):kv_block_reuse_gap_seconds_bucket", namespace="$namespace", pod=~"$modelserver_pod_regex"}[5m])))
    kv_block_reuse_gap_p90_seconds_by_pod: histogram_quantile(0.9, sum by (pod, le) (rate({__name__=~"(vllm|kserve_vllm):kv_block_reuse_gap_seconds_bucket", namespace="$namespace", pod=~"$modelserver_pod_regex"}[5m])))
    kv_block_reuse_gap_p99_seconds_by_pod: histogram_quantile(0.99, sum by (pod, le) (rate({__name__=~"(vllm|kserve_vllm):kv_block_reuse_gap_seconds_bucket", namespace="$namespace", pod=~"$modelserver_pod_regex"}[5m])))
    cache_config_info: '{__name__=~"(vllm|kserve_vllm):cache_config_info", namespace="$namespace", pod=~"$modelserver_pod_regex"}'
    model_memory_working_set_bytes_by_pod: container_memory_working_set_bytes{namespace="$namespace", pod=~"$modelserver_pod_regex", container!="POD", container!=""}
    model_memory_rss_bytes_by_pod: container_memory_rss{namespace="$namespace", pod=~"$modelserver_pod_regex", container!="POD", container!=""}
    model_memory_failures_rate_by_pod: sum by (pod) (rate(container_memory_failcnt{namespace="$namespace", pod=~"$modelserver_pod_regex", container!="POD", container!=""}[5m]))
    model_cpu_throttling_ratio_by_pod: sum by (pod) (rate(container_cpu_cfs_throttled_periods_total{namespace="$namespace", pod=~"$modelserver_pod_regex", container!="POD", container!=""}[5m])) / clamp_min(sum by (pod) (rate(container_cpu_cfs_periods_total{namespace="$namespace", pod=~"$modelserver_pod_regex", container!="POD", container!=""}[5m])), 1)
    gpu_pcie_tx_bytes_per_second_by_pod: rate({__name__=~"DCGM_FI_PROF_PCIE_TX_BYTES", exported_namespace="$namespace", exported_pod=~"$modelserver_pod_regex"}[5m])
    gpu_pcie_rx_bytes_per_second_by_pod: rate({__name__=~"DCGM_FI_PROF_PCIE_RX_BYTES", exported_namespace="$namespace", exported_pod=~"$modelserver_pod_regex"}[5m])
    num_preemptions_rate: rate({__name__=~"(vllm|kserve_vllm):num_preemptions_total", namespace="$namespace", pod=~"$modelserver_pod_regex"}[5m])
    scheduler_up: up{namespace="$namespace", pod=~"$scheduler_pod_regex", endpoint=~"$scheduler_endpoint_regex"}
    scheduler_ready_pods: kserve_inference_pool_ready_pods{namespace="$namespace", pod=~"$scheduler_pod_regex"}
    scheduler_average_queue_size: kserve_inference_pool_average_queue_size{namespace="$namespace", pod=~"$scheduler_pod_regex"}
    scheduler_per_pod_queue_size: kserve_inference_pool_per_pod_queue_size{namespace="$namespace", pod=~"$scheduler_pod_regex"}
    scheduler_average_kv_cache_utilization: kserve_inference_pool_average_kv_cache_utilization{namespace="$namespace", pod=~"$scheduler_pod_regex"}
    scheduler_running_requests: kserve_inference_objective_running_requests{namespace="$namespace", pod=~"$scheduler_pod_regex"}
    scheduler_request_rate_per_second: rate(kserve_inference_objective_request_total{namespace="$namespace", pod=~"$scheduler_pod_regex"}[5m])
    scheduler_request_duration_p50_seconds: histogram_quantile(0.5, sum(rate(kserve_inference_objective_request_duration_seconds_bucket{namespace="$namespace", pod=~"$scheduler_pod_regex"}[5m])) by (le))
    scheduler_request_duration_p90_seconds: histogram_quantile(0.9, sum(rate(kserve_inference_objective_request_duration_seconds_bucket{namespace="$namespace", pod=~"$scheduler_pod_regex"}[5m])) by (le))
    scheduler_request_duration_p99_seconds: histogram_quantile(0.99, sum(rate(kserve_inference_objective_request_duration_seconds_bucket{namespace="$namespace", pod=~"$scheduler_pod_regex"}[5m])) by (le))
    scheduler_e2e_duration_p50_seconds: histogram_quantile(0.5, sum(rate(kserve_inference_extension_scheduler_e2e_duration_seconds_bucket{namespace="$namespace", pod=~"$scheduler_pod_regex"}[5m])) by (le))
    scheduler_e2e_duration_p90_seconds: histogram_quantile(0.9, sum(rate(kserve_inference_extension_scheduler_e2e_duration_seconds_bucket{namespace="$namespace", pod=~"$scheduler_pod_regex"}[5m])) by (le))
    scheduler_e2e_duration_p99_seconds: histogram_quantile(0.99, sum(rate(kserve_inference_extension_scheduler_e2e_duration_seconds_bucket{namespace="$namespace", pod=~"$scheduler_pod_regex"}[5m])) by (le))
    scheduler_plugin_duration_p50_seconds_by_plugin: histogram_quantile(0.5, sum(rate(kserve_inference_extension_plugin_duration_seconds_bucket{namespace="$namespace", pod=~"$scheduler_pod_regex"}[5m])) by (le, plugin_name, extension_point))
    scheduler_go_goroutines: kserve_go_goroutines{namespace="$namespace", pod=~"$scheduler_pod_regex"}
    scheduler_process_resident_memory_bytes: kserve_process_resident_memory_bytes{namespace="$namespace", pod=~"$scheduler_pod_regex"}
    gpu_utilization_by_pod: DCGM_FI_DEV_GPU_UTIL{exported_namespace="$namespace", exported_pod=~".*$release.*"}
    gpu_memory_used_by_pod: DCGM_FI_DEV_FB_USED{exported_namespace="$namespace", exported_pod=~".*$release.*"}
    gpu_memory_free_by_pod: DCGM_FI_DEV_FB_FREE{exported_namespace="$namespace", exported_pod=~".*$release.*"}
    cpu_usage_percent_by_pod: rate(container_cpu_usage_seconds_total{namespace="$namespace", pod=~".*$release.*"}[5m]) * 100
    memory_working_set_bytes_by_pod: container_memory_working_set_bytes{namespace="$namespace", pod=~".*$release.*"}
    network_receive_bytes_per_second: rate(container_network_receive_bytes_total{namespace="$namespace", pod=~".*$release.*"}[5m])
    network_transmit_bytes_per_second: rate(container_network_transmit_bytes_total{namespace="$namespace", pod=~".*$release.*"}[5m])
    storage_nfs_requests_rate_by_node_method: sum by (instance, method) (rate(node_nfs_requests_total{method=~"read|write|commit|Read|Write|Commit|READ|WRITE|COMMIT"}[5m]))
    storage_nfs_retransmissions_rate_by_node: sum by (instance) (rate(node_nfs_rpc_retransmissions_total[5m]))
