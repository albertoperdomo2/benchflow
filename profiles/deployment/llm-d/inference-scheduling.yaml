apiVersion: benchflow.io/v1alpha1
kind: DeploymentProfile
metadata:
  name: llm-d-inference-scheduling
spec:
  platform: llm-d
  mode: inference-scheduling
  repo_url: https://github.com/llm-d/llm-d.git
  repo_ref: v0.6.0
  gateway: istio
  endpoint_path: /v1/models
  model_storage:
    pvc_name: models-storage
    cache_dir: /models
    mount_path: /model-cache
  runtime:
    replicas: 4
    tensor_parallelism: 2
    vllm_args:
      - --max-model-len=8192
      - --gpu-memory-utilization=0.92
      - --trust-remote-code
      - --no-enable-log-requests
      - --enable-prefix-caching
