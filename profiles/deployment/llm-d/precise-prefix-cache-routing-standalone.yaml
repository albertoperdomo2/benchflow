apiVersion: benchflow.io/v1alpha1
kind: DeploymentProfile
metadata:
  name: llm-d-precise-prefix-cache-routing-standalone
spec:
  platform: llm-d
  mode: precise-prefix-cache
  repo_url: https://github.com/llm-d/llm-d.git
  repo_ref: main
  gateway: standalone
  endpoint_path: /v1/models
  model_storage:
    pvc_name: models-storage
    cache_dir: /models
    mount_path: /model-cache
  runtime:
    replicas: 8
    tensor_parallelism: 2
    env:
      USER: benchflow
    vllm_args:
      - --gpu-memory-utilization=0.95
