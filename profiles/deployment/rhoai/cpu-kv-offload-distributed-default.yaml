apiVersion: benchflow.io/v1alpha1
kind: DeploymentProfile
metadata:
  name: cpu-kv-offload-distributed-default
spec:
  platform: rhoai
  mode: distributed-default
  platform_version: RHOAI-3.5.0-ea.1
  platform_channel: beta
  endpoint_path: /v1/models
  model_storage:
    pvc_name: models-storage
    cache_dir: /models
  runtime:
    replicas: 1
    tensor_parallelism: 2
    env:
      USER: benchflow
      HOME: /tmp
      TORCHINDUCTOR_CACHE_DIR: /tmp/torchinductor
    vllm_args:
      - --max-model-len=8192
      - --gpu-memory-utilization=0.7
      - --trust-remote-code
      - --no-enable-log-requests
      - --enable-prefix-caching
      - --kv-cache-metrics
      - --kv-cache-metrics-sample=0.01
  options:
    enable_auth: false
    startup_probe:
      failureThreshold: 180
    # epp_verbosity: 10
