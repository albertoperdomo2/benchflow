apiVersion: benchflow.io/v1alpha1
kind: DeploymentProfile
metadata:
  name: rhoai-approximate-prefix-cache
spec:
  platform: rhoai
  mode: approximate-prefix-cache
  platform_version: RHOAI-3.4.0
  platform_channel: stable-3.x
  endpoint_path: /v1/models
  model_storage:
    pvc_name: models-storage
    cache_dir: /models
  runtime:
    replicas: 4
    tensor_parallelism: 2
    vllm_args:
      - --max-model-len=8192
      - --gpu-memory-utilization=0.92
      - --trust-remote-code
      - --no-enable-log-requests
      - --enable-prefix-caching
  options:
    enable_auth: false
