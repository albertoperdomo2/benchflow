apiVersion: benchflow.io/v1alpha1
kind: DeploymentProfile
metadata:
  name: rhoai-raw-kserve
spec:
  platform: rhoai
  mode: raw-kserve
  endpoint_path: /v1/models
  model_storage:
    pvc_name: models-storage
    cache_dir: /models
  runtime:
    image: registry.redhat.io/rhaiis/vllm-cuda-rhel9:3.3.0
    replicas: 4
    tensor_parallelism: 2
    vllm_args:
      - --max-model-len=8192
      - --gpu-memory-utilization=0.92
      - --trust-remote-code
      - --disable-log-requests
      - --enable-prefix-caching
    env:
      HF_HUB_OFFLINE: "1"
  options:
    enable_auth: false
