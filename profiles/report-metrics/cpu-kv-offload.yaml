title: Prometheus Metrics
metrics:
  - title: KV cache usage
    description: GPU KV cache pressure per model-server pod.
    query: '{__name__=~"(vllm|kserve_vllm):kv_cache_usage_perc", namespace="$namespace", pod=~"$modelserver_pod_regex"}'

  - title: Prompt tokens by source
    description: Prompt-token prefill rate split by local compute, local prefix-cache hits, and external KV transfer.
    query: 'sum by (pod, source) (rate({__name__=~"(vllm|kserve_vllm):prompt_tokens_by_source_total", namespace="$namespace", pod=~"$modelserver_pod_regex", source=~"local_compute|local_cache_hit|external_kv_transfer"}[5m]))'
    series: '{{pod}} {{source}}'
    yaxis: tokens/s

  - title: Request preemptions
    description: vLLM preemption rate; spikes usually mean KV pressure is disrupting scheduling.
    query: 'rate({__name__=~"(vllm|kserve_vllm):num_preemptions_total", namespace="$namespace", pod=~"$modelserver_pod_regex"}[5m])'

  - title: Running / waiting requests
    description: Scheduler request state by model-server pod.
    query: 'label_replace({__name__=~"(vllm|kserve_vllm):num_requests_running", namespace="$namespace", pod=~"$modelserver_pod_regex"}, "state", "running", "__name__", ".*") or label_replace({__name__=~"(vllm|kserve_vllm):num_requests_waiting", namespace="$namespace", pod=~"$modelserver_pod_regex"}, "state", "waiting", "__name__", ".*")'
    series: '{{pod}} {{state}}'
    yaxis: requests

  - title: Requests by waiting reason
    description: Scheduler queue depth by reason; capacity usually points at KV memory pressure, while deferred usually points at scheduler policy.
    query: '{__name__=~"(vllm|kserve_vllm):num_requests_waiting_by_reason", namespace="$namespace", pod=~"$modelserver_pod_regex"}'
    series: '{{pod}} {{reason}}'
    yaxis: requests

  - title: KV offload transfer throughput
    description: Read/write transfer rate attributed to the vLLM KV offload connector.
    query: 'sum by (pod, transfer_type) (rate({__name__=~"(vllm|kserve_vllm):kv_offload_total_bytes_total", namespace="$namespace", pod=~"$modelserver_pod_regex"}[5m]))'

  - title: GPU <-> CPU cumulative transfer volume
    description: Cumulative KV bytes moved between GPU and CPU offload storage.
    query: 'label_replace({__name__=~"(vllm|kserve_vllm):kv_offload_store_bytes_total", namespace="$namespace", pod=~"$modelserver_pod_regex"}, "direction", "GPU_to_CPU", "__name__", ".*") or label_replace({__name__=~"(vllm|kserve_vllm):kv_offload_load_bytes_total", namespace="$namespace", pod=~"$modelserver_pod_regex"}, "direction", "CPU_to_GPU", "__name__", ".*")'
    series: '{{pod}} {{direction}}'
    scale: 0.000000001
    yaxis: GB

  - title: GPU <-> CPU transfer throughput
    description: Wall-clock bytes moved between GPU and CPU KV-cache storage; GPU_to_CPU stores evicted blocks, CPU_to_GPU loads them back.
    query: 'label_replace(rate({__name__=~"(vllm|kserve_vllm):kv_offload_store_bytes_total", namespace="$namespace", pod=~"$modelserver_pod_regex"}[5m]), "direction", "GPU_to_CPU", "__name__", ".*") or label_replace(rate({__name__=~"(vllm|kserve_vllm):kv_offload_load_bytes_total", namespace="$namespace", pod=~"$modelserver_pod_regex"}[5m]), "direction", "CPU_to_GPU", "__name__", ".*")'
    series: '{{pod}} {{direction}}'
    scale: 0.000000001
    yaxis: GB/s

  - title: GPU <-> CPU transfer operations
    description: Individual KV transfer operations per second.
    query: 'label_replace(rate({__name__=~"(vllm|kserve_vllm):kv_offload_store_size_count", namespace="$namespace", pod=~"$modelserver_pod_regex"}[5m]), "direction", "GPU_to_CPU", "__name__", ".*") or label_replace(rate({__name__=~"(vllm|kserve_vllm):kv_offload_load_size_count", namespace="$namespace", pod=~"$modelserver_pod_regex"}[5m]), "direction", "CPU_to_GPU", "__name__", ".*")'
    series: '{{pod}} {{direction}}'
    yaxis: ops/s

  - title: GPU <-> CPU transfer latency
    description: Average transfer latency per operation.
    query: 'label_replace(rate({__name__=~"(vllm|kserve_vllm):kv_offload_store_time_total", namespace="$namespace", pod=~"$modelserver_pod_regex"}[5m]) / clamp_min(rate({__name__=~"(vllm|kserve_vllm):kv_offload_store_size_count", namespace="$namespace", pod=~"$modelserver_pod_regex"}[5m]), 0.001) * 1000, "direction", "GPU_to_CPU", "__name__", ".*") or label_replace(rate({__name__=~"(vllm|kserve_vllm):kv_offload_load_time_total", namespace="$namespace", pod=~"$modelserver_pod_regex"}[5m]) / clamp_min(rate({__name__=~"(vllm|kserve_vllm):kv_offload_load_size_count", namespace="$namespace", pod=~"$modelserver_pod_regex"}[5m]), 0.001) * 1000, "direction", "CPU_to_GPU", "__name__", ".*")'
    series: '{{pod}} {{direction}}'
    yaxis: ms/transfer

  - title: GPU <-> CPU active throughput
    description: Bytes transferred divided by active transfer time; this estimates backend bandwidth during offload I/O bursts.
    query: 'label_replace(rate({__name__=~"(vllm|kserve_vllm):kv_offload_store_bytes_total", namespace="$namespace", pod=~"$modelserver_pod_regex"}[5m]) / clamp_min(rate({__name__=~"(vllm|kserve_vllm):kv_offload_store_time_total", namespace="$namespace", pod=~"$modelserver_pod_regex"}[5m]), 0.001), "direction", "GPU_to_CPU", "__name__", ".*") or label_replace(rate({__name__=~"(vllm|kserve_vllm):kv_offload_load_bytes_total", namespace="$namespace", pod=~"$modelserver_pod_regex"}[5m]) / clamp_min(rate({__name__=~"(vllm|kserve_vllm):kv_offload_load_time_total", namespace="$namespace", pod=~"$modelserver_pod_regex"}[5m]), 0.001), "direction", "CPU_to_GPU", "__name__", ".*")'
    series: '{{pod}} {{direction}}'
    scale: 0.000000001
    yaxis: GB/s active

  - title: GPU <-> CPU average transfer size
    description: Average bytes per KV transfer operation.
    query: 'label_replace(rate({__name__=~"(vllm|kserve_vllm):kv_offload_store_size_sum", namespace="$namespace", pod=~"$modelserver_pod_regex"}[5m]) / clamp_min(rate({__name__=~"(vllm|kserve_vllm):kv_offload_store_size_count", namespace="$namespace", pod=~"$modelserver_pod_regex"}[5m]), 0.001), "direction", "GPU_to_CPU", "__name__", ".*") or label_replace(rate({__name__=~"(vllm|kserve_vllm):kv_offload_load_size_sum", namespace="$namespace", pod=~"$modelserver_pod_regex"}[5m]) / clamp_min(rate({__name__=~"(vllm|kserve_vllm):kv_offload_load_size_count", namespace="$namespace", pod=~"$modelserver_pod_regex"}[5m]), 0.001), "direction", "CPU_to_GPU", "__name__", ".*")'
    series: '{{pod}} {{direction}}'
    scale: 0.000001
    yaxis: MB/transfer

  - title: KV offload transfer cost
    description: Seconds spent per GiB transferred; lower values indicate cheaper offload I/O.
    query: 'sum by (pod, transfer_type) (rate({__name__=~"(vllm|kserve_vllm):kv_offload_total_time_total", namespace="$namespace", pod=~"$modelserver_pod_regex"}[5m])) / clamp_min(sum by (pod, transfer_type) (rate({__name__=~"(vllm|kserve_vllm):kv_offload_total_bytes_total", namespace="$namespace", pod=~"$modelserver_pod_regex"}[5m])) / 1024 / 1024 / 1024, 0.001)'

  - title: KV block lifetime P90
    description: How long sampled KV blocks remain alive before release or eviction.
    query: 'histogram_quantile(0.9, sum by (pod, le) (rate({__name__=~"(vllm|kserve_vllm):kv_block_lifetime_seconds_bucket", namespace="$namespace", pod=~"$modelserver_pod_regex"}[5m])))'

  - title: KV block idle before eviction P90
    description: Idle time before sampled KV blocks are evicted; longer values imply blocks had residency without reuse.
    query: 'histogram_quantile(0.9, sum by (pod, le) (rate({__name__=~"(vllm|kserve_vllm):kv_block_idle_before_evict_seconds_bucket", namespace="$namespace", pod=~"$modelserver_pod_regex"}[5m])))'

  - title: KV block reuse gap P90
    description: Time between sampled KV block reuses; lower gaps indicate tighter reuse behavior.
    query: 'histogram_quantile(0.9, sum by (pod, le) (rate({__name__=~"(vllm|kserve_vllm):kv_block_reuse_gap_seconds_bucket", namespace="$namespace", pod=~"$modelserver_pod_regex"}[5m])))'

  - title: Model server RSS memory
    description: Resident memory for model-server containers.
    query: 'container_memory_rss{namespace="$namespace", pod=~"$modelserver_pod_regex", container!="POD", container!=""}'

  - title: GPU utilization
    description: DCGM GPU utilization for pods participating in the benchmark release.
    query: 'DCGM_FI_DEV_GPU_UTIL{exported_namespace="$namespace", exported_pod=~".*$release.*"}'

  - title: GPU memory used
    description: DCGM framebuffer memory used by GPUs participating in the benchmark release.
    query: 'DCGM_FI_DEV_FB_USED{exported_namespace="$namespace", exported_pod=~".*$release.*"}'

  - title: GPU PCIe transmit throughput
    description: DCGM PCIe transmit traffic by model-server GPU.
    query: 'rate({__name__=~"DCGM_FI_PROF_PCIE_TX_BYTES", exported_namespace="$namespace", exported_pod=~"$modelserver_pod_regex"}[5m])'

  - title: GPU PCIe receive throughput
    description: DCGM PCIe receive traffic by model-server GPU; spikes can indicate KV blocks returning from CPU offload.
    query: 'rate({__name__=~"DCGM_FI_PROF_PCIE_RX_BYTES", exported_namespace="$namespace", exported_pod=~"$modelserver_pod_regex"}[5m])'
