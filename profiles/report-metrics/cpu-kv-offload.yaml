title: Prometheus Metrics
metrics:
  - title: KV cache usage
    description: GPU KV cache pressure per model-server pod.
    query: '{__name__=~"(vllm|kserve_vllm):kv_cache_usage_perc", namespace="$namespace", pod=~"$modelserver_pod_regex"}'

  - title: Prompt tokens by source
    description: Prompt-token prefill rate split by local compute, local prefix-cache hits, and external KV transfer.
    query: 'sum by (pod, source) (rate({__name__=~"(vllm|kserve_vllm):prompt_tokens_by_source_total", namespace="$namespace", pod=~"$modelserver_pod_regex", source=~"local_compute|local_cache_hit|external_kv_transfer"}[5m]))'
    series: '{{pod}} {{source}}'
    yaxis: tokens/s

  - title: Request preemptions
    description: vLLM preemption rate; spikes usually mean KV pressure is disrupting scheduling.
    query: 'rate({__name__=~"(vllm|kserve_vllm):num_preemptions_total", namespace="$namespace", pod=~"$modelserver_pod_regex"}[5m])'

  - title: Running / waiting requests
    description: Scheduler request state by model-server pod.
    metric: requests_running_waiting
    series: '{{pod}} {{state}}'
    yaxis: requests

  - title: Requests by waiting reason
    description: Scheduler queue depth by reason; falls back to reason=unspecified when the vLLM image exposes only the aggregate waiting gauge.
    metric: requests_waiting_by_reason
    fallback_metric: num_requests_waiting
    series: '{{pod}} {{reason}}'
    fallback_series: '{{pod}} unspecified'
    yaxis: requests

  - title: KV offload transfer throughput
    description: GPU_to_CPU and CPU_to_GPU KV transfer rate attributed to the vLLM KV offload connector.
    metric: kv_offload_bytes_rate_by_pod
    series: '{{pod}} {{transfer_type}}'
    scale: 0.000000001
    yaxis: GB/s

  - title: KV offload transfer active time
    description: Fractional seconds per second spent moving KV data between GPU and CPU.
    metric: kv_offload_time_rate_by_pod
    series: '{{pod}} {{transfer_type}}'
    yaxis: seconds/s

  - title: KV offload transfer cost
    description: Seconds spent per GiB transferred; lower values indicate cheaper offload I/O.
    metric: kv_offload_seconds_per_gib_by_pod
    series: '{{pod}} {{transfer_type}}'
    yaxis: seconds/GiB

  - title: KV block lifetime P90
    description: How long sampled KV blocks remain alive before release or eviction.
    query: 'histogram_quantile(0.9, sum by (pod, le) (rate({__name__=~"(vllm|kserve_vllm):kv_block_lifetime_seconds_bucket", namespace="$namespace", pod=~"$modelserver_pod_regex"}[5m])))'

  - title: KV block idle before eviction P90
    description: Idle time before sampled KV blocks are evicted; longer values imply blocks had residency without reuse.
    query: 'histogram_quantile(0.9, sum by (pod, le) (rate({__name__=~"(vllm|kserve_vllm):kv_block_idle_before_evict_seconds_bucket", namespace="$namespace", pod=~"$modelserver_pod_regex"}[5m])))'

  - title: KV block reuse gap P90
    description: Time between sampled KV block reuses; lower gaps indicate tighter reuse behavior.
    query: 'histogram_quantile(0.9, sum by (pod, le) (rate({__name__=~"(vllm|kserve_vllm):kv_block_reuse_gap_seconds_bucket", namespace="$namespace", pod=~"$modelserver_pod_regex"}[5m])))'

  - title: Model server RSS memory
    description: Resident memory for model-server containers.
    query: 'container_memory_rss{namespace="$namespace", pod=~"$modelserver_pod_regex", container!="POD", container!=""}'

  - title: GPU utilization
    description: DCGM GPU utilization for pods participating in the benchmark release.
    query: 'DCGM_FI_DEV_GPU_UTIL{exported_namespace="$namespace", exported_pod=~".*$release.*"}'

  - title: GPU memory used
    description: DCGM framebuffer memory used by GPUs participating in the benchmark release.
    query: 'DCGM_FI_DEV_FB_USED{exported_namespace="$namespace", exported_pod=~".*$release.*"}'
    scale: 0.001
    yaxis: GB

  - title: GPU PCIe transmit throughput
    description: DCGM PCIe transmit traffic by model-server GPU.
    query: 'rate({__name__=~"DCGM_FI_PROF_PCIE_TX_BYTES", exported_namespace="$namespace", exported_pod=~"$modelserver_pod_regex"}[5m])'

  - title: GPU PCIe receive throughput
    description: DCGM PCIe receive traffic by model-server GPU; spikes can indicate KV blocks returning from CPU offload.
    query: 'rate({__name__=~"DCGM_FI_PROF_PCIE_RX_BYTES", exported_namespace="$namespace", exported_pod=~"$modelserver_pod_regex"}[5m])'

  - title: Node NVMe throughput
    description: Node-exporter read/write byte rate for the hostPath-backed NVMe filesystem on nodes running model-server pods.
    metric: storage_nvme_bytes_per_second_by_node_device
    required_labels: [mountpoint, device]
    series: '{{mountpoint}} {{device}} {{direction}}'
    scale: 0.000001
    yaxis: MB/s

  - title: Node NVMe IOPS
    description: Node-exporter completed read/write operation rate for the hostPath-backed NVMe filesystem on nodes running model-server pods.
    metric: storage_nvme_iops_by_node_device
    required_labels: [mountpoint, device]
    series: '{{mountpoint}} {{device}} {{direction}}'
    yaxis: ops/s

  - title: Node NVMe busy time
    description: Fractional seconds per second that the hostPath-backed NVMe device is busy on nodes running model-server pods.
    metric: storage_nvme_busy_seconds_per_second_by_node_device
    required_labels: [mountpoint, device]
    series: '{{mountpoint}} {{device}}'
    yaxis: seconds/s

  - title: NVMe filesystem available capacity
    description: Available capacity for the hostPath-backed NVMe filesystem on nodes running model-server pods.
    metric: storage_nvme_filesystem_avail_bytes_by_node_mount
    required_labels: [mountpoint, device]
    series: '{{mountpoint}} {{device}}'
    scale: 0.000000001
    yaxis: GB

  - title: NVMe filesystem usage
    description: Percent used for the hostPath-backed NVMe filesystem on nodes running model-server pods.
    metric: storage_nvme_filesystem_usage_percent_by_node_mount
    required_labels: [mountpoint, device]
    series: '{{mountpoint}} {{device}}'
    yaxis: percent

  - title: Runtime PVC used capacity
    description: Used capacity for runtime PVCs mounted into the model-server pod, including CephFS-backed KV offload PVCs.
    metric: storage_runtime_pvc_used_bytes_by_claim
    required_labels: [persistentvolumeclaim]
    series: '{{persistentvolumeclaim}}'
    scale: 0.000000001
    yaxis: GB

  - title: Runtime PVC available capacity
    description: Available capacity for runtime PVCs mounted into the model-server pod.
    metric: storage_runtime_pvc_available_bytes_by_claim
    required_labels: [persistentvolumeclaim]
    series: '{{persistentvolumeclaim}}'
    scale: 0.000000001
    yaxis: GB

  - title: Runtime PVC usage
    description: Percent used for runtime PVCs mounted into the model-server pod.
    metric: storage_runtime_pvc_usage_percent_by_claim
    required_labels: [persistentvolumeclaim]
    series: '{{persistentvolumeclaim}}'
    yaxis: percent

  - title: Ceph pool throughput
    description: Ceph read/write byte rate for CephFS pools used by runtime PVC-backed KV offload.
    metric: storage_ceph_pool_bytes_per_second_by_pool
    required_labels: [pool, direction]
    series: '{{pool}} {{direction}}'
    scale: 0.000001
    yaxis: MB/s

  - title: Ceph pool IOPS
    description: Ceph read/write operation rate for CephFS pools used by runtime PVC-backed KV offload.
    metric: storage_ceph_pool_iops_by_pool
    required_labels: [pool, direction]
    series: '{{pool}} {{direction}}'
    yaxis: ops/s

  - title: Ceph OSD operation latency
    description: Average Ceph OSD read/write operation latency while runtime PVC-backed KV offload is active.
    metric: storage_ceph_osd_op_latency_seconds_by_daemon
    required_labels: [direction]
    series: '{{series}} {{direction}}'
    yaxis: seconds

  - title: Ceph health status
    description: Ceph cluster health status during runtime PVC-backed KV offload; 0 is healthy.
    metric: storage_ceph_health_status
    yaxis: status

  - title: CephFS MDS client request rate
    description: Metadata-server client request rate while runtime PVC-backed KV offload is active.
    metric: storage_ceph_mds_client_requests_per_second_by_daemon
    series: '{{ceph_daemon}}'
    yaxis: requests/s

  - title: CephFS MDS cache inodes
    description: Metadata-server inode cache size while runtime PVC-backed KV offload is active.
    metric: storage_ceph_mds_cache_inodes_by_daemon
    series: '{{ceph_daemon}}'
    yaxis: inodes

  - title: CephFS MDS memory
    description: Metadata-server memory usage while runtime PVC-backed KV offload is active.
    metric: storage_ceph_mds_memory_bytes_by_daemon
    series: '{{ceph_daemon}}'
    scale: 0.000000001
    yaxis: GB
