apiVersion: benchflow.io/v1alpha1
kind: Experiment
metadata:
  name: cpu-offloading
spec:
  model:
    name:
      - deepseek-ai/DeepSeek-V4-Flash
      # - openai/gpt-oss-120b  # completions?? lower gmu to 0.6 or 0.5
      # - nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-FP8
      # - google/gemma-4-31B
      # - Qwen/Qwen3.6-35B-A3B  # --gpu-memory-utilization=0.7
  deployment_profile: 
    - cpu-kv-offload-distributed-default
    # - rhoai-cpu-kv-offload-160g
    # - rhoai-cpu-kv-offload-64g
    # - rhoai-cpu-kv-offload-96g
    # - multi-tier-offloading-nvme
    - multi-tier-offloading-cephfs
  benchmark_profile:
    - aiperf-agentx-inference
    # - cpu-offloading-short-context
    # - cpu-offloading-long-output
    # - cpu-offloading-long-context
  model_overrides:
    deepseek-ai/DeepSeek-V4-Flash:
      runtime:
        vllm_extra_args:
          - --kv-cache-dtype=fp8
          - --gpu-memory-utilization=0.7
      scale:
        tensor_parallelism: 8
    openai/gpt-oss-120b:
      # benchmark:
        # request_type: /v1/completions
      runtime:
        vllm_extra_args:
          - --gpu-memory-utilization=0.6
    nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-FP8:
      scale:
        tensor_parallelism: 4
      runtime:
        vllm_extra_args:
          - --gpu-memory-utilization=0.6
    Qwen/Qwen3.6-35B-A3B:
      runtime:
        vllm_extra_args:
          - --gpu-memory-utilization=0.7
    google/gemma-4-31B:
      # benchmark:
        # request_type: /v1/completions
      runtime:
        vllm_extra_args:
          - --gpu-memory-utilization=0.6
  overrides:
    images:
      runtime: vllm/vllm-openai:v0.23.0
    runtime:
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - topologyKey: kubernetes.io/hostname
              labelSelector:
                matchLabels:
                  app.kubernetes.io/part-of: llminferenceservice
                  kserve.io/component: workload
              matchLabelKeys:
                - app.kubernetes.io/name
      placement:
        mode: sequential
  metrics_profile: detailed
  target:
    endpoint_scope: internal
  mlflow:
    tags:
      accelerator: H100
  namespace: benchflow
  execution:
    timeout: 8h
