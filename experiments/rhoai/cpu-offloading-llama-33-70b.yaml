apiVersion: benchflow.io/v1alpha1
kind: Experiment
metadata:
  name: cpu-offloading-llama-33-70b
spec:
  model:
    name:
      - RedHatAI/Llama-3.3-70B-Instruct-FP8-dynamic
  deployment_profile:
    - rhoai-distributed-default
    - rhoai-cpu-kv-offload-100g
  benchmark_profile:
    - cpu-offloading-short-context
    - cpu-offloading-long-output
    - cpu-offloading-long-context
  metrics_profile: detailed
  mlflow:
    tags:
      accelerator: H200
      offload_type: cpu-kv
  namespace: benchflow
  execution:
    timeout: 8h
