apiVersion: benchflow.io/v1alpha1
kind: Experiment
metadata:
  name: llama-33-70b-rhoai-release
spec:
  model:
    name:
      - RedHatAI/Llama-3.3-70B-Instruct-FP8-dynamic
  deployment_profile:
    - rhaiis-raw-vllm
    - rhoai-distributed-default
    - rhoai-approximate-prefix-cache
    - rhoai-precise-prefix-cache
  benchmark_profile:
    - guidellm-concurrent-1k-1k
    - guidellm-concurrent-heavy-heterogeneous
    - guidellm-multi-turn
    # - guidellm-concurrent-heavy-heterogeneous-v2
    # - aiperf-mooncake-trace
    # - aiperf-mooncake-toolagent-trace
  metrics_profile: detailed
  mlflow:
    tags:
      accelerator: H200
  overrides:
    runtime:
      affinity:
        podAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: benchflow
                    benchflow.io/experiment: llama-33-70b-rhoai-release
  namespace: benchflow
  execution:
    timeout: 8h
