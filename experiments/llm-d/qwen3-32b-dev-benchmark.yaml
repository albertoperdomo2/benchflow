apiVersion: benchflow.io/v1alpha1
kind: Experiment
metadata:
  name: qwen3-32b-dev-benchmark
spec:
  model:
    name: Qwen/Qwen3-32B
  deployment_profile:
    - llm-d-optimized-baseline-standalone
    - llm-d-optimized-baseline-gateway
    - llm-d-precise-prefix-cache-routing-standalone
    - llm-d-precise-prefix-cache-routing-gateway
  benchmark_profile: 
    - guidellm-x-70r-6kSys
  metrics_profile: detailed
  mlflow:
    tags:
      accelerator: H200
      version: "main"
      deployment_type: "epp-v0.9.0"
      deployment_profile: "epp-v0.9.0"
  namespace: benchflow
  execution:
    timeout: 8h
  overrides:
    images:
      scheduler: ghcr.io/llm-d/llm-d-router-endpoint-picker:v0.9.0
