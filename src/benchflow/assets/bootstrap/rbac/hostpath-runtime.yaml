apiVersion: security.openshift.io/v1
kind: SecurityContextConstraints
metadata:
  name: benchflow-hostpath-runtime
  labels:
    app.kubernetes.io/name: benchflow
    benchflow.io/purpose: hostpath-runtime
priority: 10
allowPrivilegedContainer: true
allowPrivilegeEscalation: true
allowHostDirVolumePlugin: true
allowHostNetwork: false
allowHostPID: false
allowHostIPC: false
allowHostPorts: false
readOnlyRootFilesystem: false
requiredDropCapabilities:
  - MKNOD
runAsUser:
  # RHOAI v3.5.0-ea.2 requires a non-root model-server process. Let OpenShift
  # inject the namespace's allocated UID rather than defaulting to image root.
  type: MustRunAsRange
seLinuxContext:
  # Use the namespace MCS level for every hostPath pod. RunAsAny assigns a
  # different level per pod, which makes a shared local NVMe directory
  # unreadable to subsequent replicas on SELinux-enforcing OpenShift nodes.
  type: MustRunAs
fsGroup:
  type: RunAsAny
supplementalGroups:
  type: RunAsAny
seccompProfiles:
  - runtime/default
  - localhost/*
volumes:
  - configMap
  - csi
  - downwardAPI
  - emptyDir
  - ephemeral
  - hostPath
  - image
  - persistentVolumeClaim
  - projected
  - secret
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: benchflow-hostpath-runtime
  namespace: "{{ BENCHFLOW_NAMESPACE }}"
  labels:
    app.kubernetes.io/name: benchflow
    benchflow.io/purpose: hostpath-runtime
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: benchflow-hostpath-runtime
  labels:
    app.kubernetes.io/name: benchflow
    benchflow.io/purpose: hostpath-runtime
rules:
  - apiGroups:
      - security.openshift.io
    resources:
      - securitycontextconstraints
    resourceNames:
      - benchflow-hostpath-runtime
    verbs:
      - use
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: benchflow-hostpath-runtime-scc
  namespace: "{{ BENCHFLOW_NAMESPACE }}"
  labels:
    app.kubernetes.io/name: benchflow
    benchflow.io/purpose: hostpath-runtime
subjects:
  - kind: ServiceAccount
    name: benchflow-hostpath-runtime
    namespace: "{{ BENCHFLOW_NAMESPACE }}"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: benchflow-hostpath-runtime
