apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: "benchflow-runner-cephfs-diagnostics-{{ BENCHFLOW_NAMESPACE }}"
  namespace: rook-ceph
  labels:
    app.kubernetes.io/name: benchflow
    benchflow.io/purpose: cephfs-diagnostics
rules:
  # Artifact collection reads benchmark-window CephFS logs and state only.
  - apiGroups: [""]
    resources: ["pods", "events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: ["ceph.rook.io"]
    resources: ["cephclusters", "cephfilesystems"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: "benchflow-runner-cephfs-diagnostics-{{ BENCHFLOW_NAMESPACE }}"
  namespace: rook-ceph
  labels:
    app.kubernetes.io/name: benchflow
    benchflow.io/purpose: cephfs-diagnostics
subjects:
  - kind: ServiceAccount
    name: benchflow-runner
    namespace: "{{ BENCHFLOW_NAMESPACE }}"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: "benchflow-runner-cephfs-diagnostics-{{ BENCHFLOW_NAMESPACE }}"
