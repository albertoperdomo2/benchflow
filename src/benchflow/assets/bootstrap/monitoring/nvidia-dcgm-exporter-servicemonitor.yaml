apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: nvidia-dcgm-exporter
  namespace: "{{ GPU_OPERATOR_NAMESPACE }}"
  labels:
    app: nvidia-dcgm-exporter
    app.kubernetes.io/part-of: benchflow
spec:
  endpoints:
    - path: /metrics
      port: gpu-metrics
  namespaceSelector:
    matchNames:
      - "{{ GPU_OPERATOR_NAMESPACE }}"
  selector:
    matchLabels:
      app: nvidia-dcgm-exporter
